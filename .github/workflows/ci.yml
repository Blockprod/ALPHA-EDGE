name: AlphaEdge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint + Format check (Ruff)
        run: |
          python -m ruff check alphaedge/ --config pyproject.toml
          python -m ruff format --check alphaedge/

      - name: Type checking (Pyright / Pylance)
        run: |
          python -m pyright alphaedge/

      - name: Secret scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Tests (Pytest)
        run: |
          python -m pytest alphaedge/tests/ -v --tb=short \
            --cov=alphaedge \
            --cov-report=term-missing \
            --cov-fail-under=80
